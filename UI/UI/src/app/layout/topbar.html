<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">{{ pageMeta().title }}</div>
    <div class="topbar-meta">{{ pageMeta().meta }}</div>
  </div>
  <div class="topbar-right">
    <div class="chip"><span class="dot green"></span>&nbsp;Pipeline Ready</div>
    <div class="chip">👤 {{ auth.user()?.role === 'super_admin' ? 'Super Admin' : 'Client' }}</div>
    <!-- Only show the client-id chip when there is one. Admin-console pages
         are cross-tenant so the pill would otherwise render empty. -->
    @if (auth.getClientId()) {
      <div class="chip font-mono" style="color:var(--accent-cyan)">{{ auth.getClientId() }}</div>
    }
  </div>
</header>
