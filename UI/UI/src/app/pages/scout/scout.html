<div class="page-anim scout-page">
  <!-- Header -->
  <div class="scout-header">
    <div>
      <h1 class="scout-title">Scout Agent</h1>
      <p class="scout-subtitle">Competitive price intelligence across e-commerce platforms</p>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="pill-tabs scout-tabs">
    @for (tab of tabs; track tab.id) {
      <div class="pt" [class.active]="activeTab() === tab.id" (click)="setTab(tab.id)">
        <span class="tab-icon">{{ tab.icon }}</span>
        {{ tab.label }}
      </div>
    }
  </div>

  <!-- Tab Content -->
  <!-- Tab Content
       All tabs are always mounted. Inactive ones are hidden via [hidden],
       which keeps their component state, signals, and any in-flight HTTP
       calls alive. Previously used @switch/@case destroyed and recreated
       the component on every tab change — in-progress searches, chat
       history, and monitor runs all got wiped when switching tabs. -->
  <div class="tab-content">
    <div [hidden]="activeTab() !== 'chat'">      <scout-chat /></div>
    <div [hidden]="activeTab() !== 'monitor'">   <scout-monitor /></div>
    <div [hidden]="activeTab() !== 'search'">    <scout-search /></div>
    <div [hidden]="activeTab() !== 'compare'">   <scout-compare /></div>
    <div [hidden]="activeTab() !== 'platforms'"> <scout-platforms /></div>
  </div>
</div>
