<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-title">🛒 <span>Walmart</span></div>
    <div class="sb-logo-sub">Analytics Platform v4.0</div>
  </div>

  <div class="sb-section">
    <div class="sb-section-label">Client Portal</div>
    @for (item of clientNav; track item.path) {
      <a class="nav-item"
         [routerLink]="item.path"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: false }">
        <span class="nav-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    }
  </div>

  @if (auth.isAdmin()) {
    <div class="sb-section">
      <div class="sb-section-label">Admin Console</div>
      @for (item of adminNav; track item.path) {
        <a class="nav-item"
           [routerLink]="item.path"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: false }">
          <span class="nav-icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </div>
  }

  <div class="sb-footer">
    <div class="sb-footer-user">
      <span class="dot green"></span>
      {{ auth.user()?.email }}
    </div>
    <button class="btn outline sm" (click)="logout()">Sign Out</button>
  </div>
</aside>
