apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crp-ml-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crp-ml-worker
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
