apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - configmap.yaml
  - redis.yaml
  - api.yaml
  - ml-worker.yaml
  - hpa.yaml
  # secret.example.yaml is intentionally NOT listed — copy it to secret.yaml,
  # fill real values, and `kubectl apply -f secret.yaml` separately so the
  # placeholder is never deployed and the real secret is never committed.
