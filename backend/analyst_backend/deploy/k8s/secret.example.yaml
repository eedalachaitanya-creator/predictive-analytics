# Copy to secret.yaml, fill real values, `kubectl apply -f secret.yaml`.
# DO NOT commit the filled-in secret.
apiVersion: v1
kind: Secret
metadata:
  name: crp-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@DB_HOST:5432/walmart_crp"
  SECRET_KEY: "change-me-to-a-long-random-string"
  OPENAI_API_KEY: ""   # optional — only if EMOTION_USE_LLM=1
